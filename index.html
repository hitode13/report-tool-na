<body class="bg-stone-100">
  <div id="root">
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;">
      <div class="loader"></div>
      <div style="color: #78716c; font-size: 14px;">読み込み中...</div>
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;

    // ========== アイコン ==========
    const ICONS = {
      file: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></>,
      table: <><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></>,
      copy: <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
      share: <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></>,
      download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
      plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
      trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></>,
      folder: <><path d="M3 7V5a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></>,
      check: <polyline points="20 6 9 17 4 12"/>,
      x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
      edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
      copyplus: <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/><line x1="15" y1="12" x2="15" y2="18"/><line x1="12" y1="15" x2="18" y2="15"/></>,
      chevDown: <polyline points="6 9 12 15 18 9"/>,
      chevUp: <polyline points="18 15 12 9 6 15"/>,
      alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
      image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
    };
    const Icon = ({ name, size = 18, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {ICONS[name]}
      </svg>
    );

    // ========== 定数 ==========
    const ANT_METHOD_OPTIONS = ['インシュロック', '両面', '金具S', 'その他'];
    const WIRING_OPTIONS = ['マウントベース', 'コードクリップ', 'スキマベース', '床下', '天井裏', '高所', '露出配線', 'その他'];
    const ENTRY_OPTIONS = ['スキマ', 'ダクト', '換気扇', '既存の穴', 'その他'];
    const HIGH_ITEMS_OPTIONS = ['本体', 'D-ANT', 'S-ANT', 'ケーブル'];
    const BB_LINE_OPTIONS = ['フレッツ光', 'コラボ', 'eo光', 'その他', 'なし', '未確認'];
    const SOLO_REASONS = ['駅遠い', '高所'];
    const VISIT_RESULT_OPTIONS = ['本体設置', '本体＋ANT設置', 'ANT設置', '本体交換', 'ANT移設', 'ANT調整', '全撤去完了', '調査のみ', 'その他'];

    // 引継ぎ欄の選択肢
    const COMPLAINT_OPTIONS = ['通話途切れ', '発着信ができない', 'インターネットが遅い', 'home5Gが遅い', 'その他'];
    const CALL_AFTER_OPTIONS = ['問題なし', '測定値は基準値以下だが通話OK', '測定値は問題ないが一部通話途切れあり', 'その他'];
    const INTERNET_AFTER_OPTIONS = ['インターネット問題なし', '若干遅いが以前より早くなった', 'インターネットが開かない', 'キャッシュレス決済問題なし', 'スループットは問題ないがhome5Gは遅い', 'その他'];
    const THROUGHPUT_OPTIONS = ['問題なし', 'DLが低い', 'ULが低い', 'DL、UL共に低い', 'その他'];
    const BELOW_BASELINE_REASON_OPTIONS = ['反射で補足している', 'ドナーレベルが悪い', 'ANT外付けNGで室内設置のため', '配線構成の問題で改善エリアまで電波が届かない', 'その他'];
    const IMPROVEMENT_OPTIONS = ['改善', '微改善', '未改善', '改善不可', '様子見', '調査のみ', 'その他'];
    const FREQ_OPTIONS_REPEATER = ['2137.6', '2140.0', '2142.4', '2144.8', '1870.0', '1503.4', '882.5', '885.0', '788.0'];
    const FREQ_OPTIONS_DONOR = ['2137.6', '2140.0', '2142.4', '2144.8', '882.5', '885.0'];

    // フェムトセル対応・物品情報の選択肢
    const FEMTO_SUPPORT_OPTIONS = ['対応無し', '案内書配布のみ', '契約書配布のみ', '契約書現地作成済み'];
    const CONTRACT_ADDR_OPTIONS = ['一致', '請求先', 'その他'];
    const SURVEY_STATUS_OPTIONS = ['配布', '配布忘れ', '配布不可・配布対象外'];
    const BUILDING_TYPE_OPTIONS = ['戸建', 'マンション', 'ビル', 'その他'];
    const INSTALL_TYPE_OPTIONS = ['個人宅', '事業所'];
    const REMOVAL_ITEMS_OPTIONS = ['なし', '全撤去', '一部撤去'];
    const BAG_NO_OPTIONS = ['1', '2', '3'];
    const CONFIG_TYPE_OPTIONS = ['LTE', '混在'];
    const SECOND_UNIT_OPTIONS = ['あり', 'なし'];

    // ========== 空オブジェクト ==========
    const emptyReport = () => ({
      inspector1: '', inspector2: '', // (互換性のため残す: 過去案件データの読み込みで問題が出ないように)
      repStatus: '',
      repLocation: '',
      antLocationD: '', antMethodD: [], antMethodDOther: '',
      antLocationS: '', antMethodS: [], antMethodSOther: '',
      antLocationS2: '', antMethodS2: [], antMethodS2Other: '',
      wiring: [], wiringOther: '',
      entry: [], entryOther: '',
      highItems: [], installHeight: '',
      soloVisit: '', soloReason: '',
      bbLine: '', bbLineOther: '',
      visitResults: [], visitResultOther: '',
      improvement: '', improvementOther: '',
      docomoFollowup: '',
      simpleConstruction: '',
      // 引継ぎ欄 (詳細項目)
      improvementArea: '',                       // 改善エリア (自由入力)
      complaints: [], complaintsOther: '',       // 申告内容 (複数選択)
      callAfter: '', callAfterLocation: '', callAfterOther: '', // 改善後の通話
      internetAfter: '', internetAfterOther: '',                // 改善後の通信 (単一選択)
      throughput: '', throughputOther: '',                       // スループット (単一選択)
      belowBaselineReasons: [], belowBaselineReasonsOther: '', // 事後測定が基準値以下の理由
      donorDlMbps: '', donorUlMbps: '',         // ドナー場所のスループット
      handover: '',                              // その他引継ぎ事項 (自由入力)
    });

    const emptyRow = () => ({ freq: '', pci: '', rsrp: '', rsrq: '', sinr: '' });

    const emptyExcel = () => {
      const now = new Date();
      return {
        year: String(now.getFullYear()),
        month: String(now.getMonth() + 1).padStart(2, '0'),
        day: String(now.getDate()).padStart(2, '0'),
        visitNumber: '',
        startTime: '', endTime: '',
        before: Array(6).fill(null).map(emptyRow),
        after: Array(6).fill(null).map(emptyRow),
        donor: [
          { band: 'D[2G]', freq: '', pci: '', rsrp: '', rsrq: '', sinr: '' },
          { band: 'D[800M]', freq: '', pci: '', rsrp: '', rsrq: '', sinr: '' },
        ],
        dlMbps: '', ulMbps: '',
        locationDetail: '', floor: '',
        // フェムトセル対応・物品情報
        femtoSupport: '',
        contractAddr: '',
        surveyStatus: '',
        buildingType: '',
        installType: '',
        removalItems: '',
        bagNo: '',
        configType: '',
        secondUnit: '',
        // DST表(画像出力用) - 事前/事後最大6行、ドナー1行、構成図
        dstTable: {
          before: Array.from({length: 6}, () => ({ band: '', pci: '', dl: '', ul: '', rtt: '' })),
          after: Array.from({length: 6}, () => ({ band: '', pci: '', dl: '', ul: '', rtt: '' })),
          donor: { band: '', pci: '', dl: '', ul: '', rtt: '' },
          composition: { main: [], branch1: [], branch2: [] },
        },
      };
    };

    // DST表のバンド選択肢
    // 事前/事後DST: '-'(測定なし)を含む
    const DST_BAND_OPTIONS_DEFAULT = ['2G', '1.7G', '1.5G', '800M', '700M', '-'];
    // ドナーDST: 2G/800Mのみ
    const DST_BAND_OPTIONS_DONOR = ['2G', '800M'];

    // 構成物品 (左から順に選択して「－」で連結)
    const COMPOSITION_OPTIONS = ['D', '本体', 'S', '1m', '3m', '5m', '10m', 'スキマ', 'Bコネ', '分配器'];
    // 分岐ルートでは分配器を選択不可
    const COMPOSITION_OPTIONS_BRANCH = COMPOSITION_OPTIONS.filter(o => o !== '分配器');
    const DISTRIBUTOR = '分配器';

    // Excelデータ(レピータ前/後)の周波数コード → DST表のバンド変換
    const convertFreqToBand = (freq) => {
      if (!freq) return '';
      const f = String(freq).trim();
      if (['2137.6', '2140.0', '2142.4', '2144.8'].includes(f)) return '2G';
      if (f === '1870.0') return '1.7G';
      if (f === '1503.4') return '1.5G';
      if (['882.5', '885.0'].includes(f)) return '800M';
      if (f === '788.0') return '700M';
      return ''; // 該当なし
    };

    // ========== バージョン情報 ==========
    // 更新ごとにバージョンを上げる。ヘッダーに表示されるので、
    // 最新版に切り替わっているか目視確認できる
    const APP_VERSION = 'v1.2';
    const APP_VERSION_DATE = '2026/06/29';

    // ========== localStorage ==========
    const PREFIX = 'reportTool_';
    const loadJSON = (key, fallback) => {
      try { const v = localStorage.getItem(PREFIX + key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    };
    const saveJSON = (key, value) => {
      try { localStorage.setItem(PREFIX + key, JSON.stringify(value)); } catch (e) { console.error(e); }
    };
    const deleteKey = (key) => { try { localStorage.removeItem(PREFIX + key); } catch {} };

    // ========== タイトル自動生成 ==========
    // 優先度: ユーザーが手動で名付けた名前 > 自動生成 > デフォルト
    const buildAutoTitle = (reportData, excelData) => {
      const parts = [];
      if (excelData.month && excelData.day) {
        parts.push(`${parseInt(excelData.month, 10)}/${parseInt(excelData.day, 10)}`);
      }
      if (reportData.inspector1) parts.push(reportData.inspector1);
      if (excelData.visitNumber) parts.push(`${excelData.visitNumber}件目`);
      return parts.join('　');
    };

    // 共有時の短いタイトル (月日 件目のみ - ドライブのファイル名等で使用)
    const buildShareTitle = (excelData) => {
      const parts = [];
      if (excelData.month && excelData.day) {
        parts.push(`${parseInt(excelData.month, 10)}/${parseInt(excelData.day, 10)}`);
      }
      if (excelData.visitNumber) parts.push(`${excelData.visitNumber}件目`);
      return parts.length > 0 ? parts.join('　') : '調査報告書下書き';
    };

    // ========== テキスト生成 ==========
    const formatChoices = (picks, other) => {
      if (!picks || picks.length === 0) return '';
      return picks.map(p => (p === 'その他' && other) ? `その他（${other}）` : p).join('・');
    };

    const buildReportText = (d) => {
      const lines = [];

      // 訪問調査員: 固定で先頭に出力
      lines.push('【訪問調査員】　ミライト　長畑');

      // REP「未設置」の場合は何も出力しない (要件: 未設置でも【REP】未設置の行は出さない)
      if (d.repStatus === '設置') {
        if (d.repLocation) lines.push(`【REP設置場所】${d.repLocation}`);
        if (d.antLocationD) lines.push(`【D-ANT固定場所】${d.antLocationD}`);
        if (d.antMethodD.length > 0) lines.push(`【D-ANT固定方法】${formatChoices(d.antMethodD, d.antMethodDOther)}`);
        // S-ANT: 2個目(S2)に入力があれば①②の番号付き、なければ数字なし
        const hasS2 = d.antLocationS2 || (d.antMethodS2 && d.antMethodS2.length > 0);
        if (hasS2) {
          if (d.antLocationS) lines.push(`【S-ANT①固定場所】${d.antLocationS}`);
          if (d.antMethodS.length > 0) lines.push(`【S-ANT①固定方法】${formatChoices(d.antMethodS, d.antMethodSOther)}`);
          if (d.antLocationS2) lines.push(`【S-ANT②固定場所】${d.antLocationS2}`);
          if (d.antMethodS2.length > 0) lines.push(`【S-ANT②固定方法】${formatChoices(d.antMethodS2, d.antMethodS2Other)}`);
        } else {
          if (d.antLocationS) lines.push(`【S-ANT固定場所】${d.antLocationS}`);
          if (d.antMethodS.length > 0) lines.push(`【S-ANT固定方法】${formatChoices(d.antMethodS, d.antMethodSOther)}`);
        }
        if (d.wiring.length > 0) lines.push(`【配線方法】　${formatChoices(d.wiring, d.wiringOther)}`);
        if (d.entry.length > 0) lines.push(`【入線方法】　${formatChoices(d.entry, d.entryOther)}`);
        if (d.highItems.length > 0) {
          const items = d.highItems.join('・');
          const heightSuffix = d.installHeight ? ` (${d.installHeight}ｍ)` : '';
          lines.push(`【最高設置物品】　${items}${heightSuffix}`);
        }
      }

      if (d.soloVisit) {
        const solo = d.soloVisit === '否' && d.soloReason ? `否 (理由：${d.soloReason})` : d.soloVisit;
        lines.push(`【一人訪問】　${solo}`);
      }

      if (d.bbLine) {
        const bb = d.bbLine === 'その他' && d.bbLineOther ? `その他（${d.bbLineOther}）` : d.bbLine;
        lines.push(`【BB回線】　${bb}`);
      }

      if (d.visitResults && d.visitResults.length > 0) {
        const r = d.visitResults.map(x => x === 'その他' && d.visitResultOther ? `その他（${d.visitResultOther}）` : x).join('＋');
        const imp = d.improvement === 'その他' && d.improvementOther ? `その他（${d.improvementOther}）` : d.improvement;
        const impSuffix = imp ? `（${imp}）` : '';
        lines.push(`【訪問結果】　${r}${impSuffix}`);

        const imp = d.improvement === 'その他' && d.improvementOther ? `その他（${d.improvementOther}）` : d.improvement;
        lines.push(`【訪問結果】　（${imp}）`);
      }

      }

      // 詳細項目を上から順に組み立て、最後に「その他引継ぎ事項」(自由入力)を追加
      const handoverLines = [];

      if (d.improvementArea) {

      }

        const items = d.complaints

      }

        }
        handoverLines.push(`・改善後の通話：${val}`);
      }

      // ・改善後の通信 (単一選択。「その他」時は自由入力)
      if (d.internetAfter) {

        handoverLines.push(`・改善後の通信：${val}`);
      }

      if (d.throughput) {
        const val = d.throughput === 'その他' ? (d.throughputOther || 'その他') : d.throughput;
        handoverLines.push(`・スループット：${val}`);
      }

      if (d.belowBaselineReasons && d.belowBaselineReasons.length > 0) {
        const items = d.belowBaselineReasons
          .map(c => (c === 'その他' && d.belowBaselineReasonsOther) ? d.belowBaselineReasonsOther : c)
          .filter(c => c !== 'その他' || d.belowBaselineReasonsOther);

      if (d.donorDlMbps || d.donorUlMbps) {

        const ul = d.donorUlMbps || '';
        handoverLines.push(`・ドナー場所のスループット：DL:${dl}Mbps　UL:${ul}Mbps`);
      }

      // ・その他引継ぎ事項 (自由入力)
      if (d.handover) {
        handoverLines.push(`・その他引継ぎ事項：${d.handover}`);
      }

      // 引継ぎ欄に1項目でもあれば【引継ぎ】ヘッダーを付けて出力
      if (handoverLines.length > 0) {
        lines.push('【引継ぎ】');
        lines.push(...handoverLines);
      }

      return lines.join('\n');
    };

    // base64 → ArrayBuffer
    const base64ToArrayBuffer = (b64) => {
      const cleaned = b64.replace(/\s/g, '');
      const binary = atob(cleaned);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    };

    // sheet1.xml内のセルを更新
    // 値が空文字/null/undefinedの場合はスキップ(テンプレートの式・既定値を保持)
    const updateCellInXml = (xml, cellRef, value) => {
      if (value === '' || value == null) return xml;
      const escRef = cellRef.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const isNum = typeof value === 'number' || /^-?\d+(\.\d+)?$/.test(String(value).trim());
      const pattern = new RegExp(
        '<c r="' + escRef + '"([^/>]*?)(?:/>|>([\\s\\S]*?)</c>)'
      );
      return xml.replace(pattern, (match, attrs) => {
        const sMatch = attrs.match(/s="[^"]*"/);
        const sAttr = sMatch ? ' ' + sMatch[0] : '';
        if (isNum) {
          // 元の文字列形式を保持 (例: "2140.0" → 2140 にしない)
          const numStr = typeof value === 'number' ? String(value) : String(value).trim();
          return '<c r="' + cellRef + '"' + sAttr + '><v>' + numStr + '</v></c>';
        } else {
          const esc = String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
          return '<c r="' + cellRef + '"' + sAttr + ' t="inlineStr"><is><t>' + esc + '</t></is></c>';
        }
      });
    };

    // 入力データ → セル位置マッピング
    const buildCellMap = (e, reportData) => {
      const map = {};
      // 基本情報
      const dateStr = (e.year && e.month && e.day) ? `${e.year}/${parseInt(e.month, 10)}/${parseInt(e.day, 10)}` : '';
      if (dateStr) map['B3'] = dateStr;
      if (e.startTime) map['G4'] = e.startTime;
      if (e.endTime) map['L4'] = e.endTime;
      // Q3セルはテンプレート固定の「１台目」「２台目」ラベルなので上書きしない
      // 訪問調査員(報告書テキストタブから)
      if (reportData) {
        if (reportData.inspector1) map['AB4'] = reportData.inspector1;
        if (reportData.inspector2) map['AG4'] = reportData.inspector2;
        // 氏名2が空なら "・" も消す (元はAF4="・"固定)
        if (reportData.inspector1 && !reportData.inspector2) map['AF4'] = ' ';
      }
      // 案件・種別はExcelタブには項目がないので省略
      // レピータ設置前 (E,I,L,O,R 列の 9〜14行)
      const beforeCols = { freq: 'E', pci: 'I', rsrp: 'L', rsrq: 'O', sinr: 'R' };
      // 値が空または "-" のみは無効(SINRの符号だけ設定された状態など)
      const hasValue = (v) => v !== '' && v != null && v !== '-';

      (e.before || []).forEach((row, i) => {
        const r = 9 + i;
        Object.entries(beforeCols).forEach(([k, col]) => {
          if (hasValue(row[k])) map[col + r] = row[k];
        });
      });
      // レピータ設置後 (X,AB,AE,AH,AK 列の 9〜14行)
      const afterCols = { freq: 'X', pci: 'AB', rsrp: 'AE', rsrq: 'AH', sinr: 'AK' };
      (e.after || []).forEach((row, i) => {
        const r = 9 + i;
        Object.entries(afterCols).forEach(([k, col]) => {
          if (hasValue(row[k])) map[col + r] = row[k];
        });
      });
      // ドナー測定値 (行15)
      const donor = e.donor || [];
      const dG = donor[0] || {};
      const dM = donor[1] || {};
      if (dG.freq) map['E15'] = dG.freq;
      if (hasValue(dG.pci)) map['I15'] = dG.pci;
      if (hasValue(dG.rsrp)) map['L15'] = dG.rsrp;
      if (hasValue(dG.rsrq)) map['O15'] = dG.rsrq;
      if (hasValue(dG.sinr)) map['R15'] = dG.sinr;
      if (dM.freq) map['X15'] = dM.freq;
      if (hasValue(dM.pci)) map['AB15'] = dM.pci;
      if (hasValue(dM.rsrp)) map['AE15'] = dM.rsrp;
      if (hasValue(dM.rsrq)) map['AH15'] = dM.rsrq;
      if (hasValue(dM.sinr)) map['AK15'] = dM.sinr;
      // DST結果
      if (hasValue(e.dlMbps)) map['W17'] = e.dlMbps;
      if (hasValue(e.ulMbps)) map['AE17'] = e.ulMbps;
      // 調査場所
      if (e.locationDetail) map['F21'] = e.locationDetail;
      if (e.floor) map['M20'] = e.floor + '階';
      // フェムトセル対応・物品情報 (ツール出力上の位置 - マクロが本物用に1行上に変換する)
      if (e.femtoSupport) map['B66'] = e.femtoSupport;
      if (e.contractAddr) map['B69'] = e.contractAddr;
      if (e.surveyStatus) map['O69'] = e.surveyStatus;
      if (e.buildingType) map['B72'] = e.buildingType;
      if (e.installType) map['N72'] = e.installType;
      if (e.removalItems) map['Z72'] = e.removalItems;
      if (e.bagNo) map['B75'] = e.bagNo;
      if (e.configType) map['H75'] = e.configType;
      if (e.secondUnit) map['N75'] = e.secondUnit;
      return map;
    };

    // テンプレートにユーザー値を埋め込んだxlsxのBlobを返す
    const buildTemplateBlob = async (e, reportData) => {
      const buffer = base64ToArrayBuffer(TEMPLATE_B64);
      const zip = await JSZip.loadAsync(buffer);
      let sheetXml = await zip.file('xl/worksheets/sheet1.xml').async('text');
      const cellMap = buildCellMap(e, reportData);
      for (const [cellRef, value] of Object.entries(cellMap)) {
        sheetXml = updateCellInXml(sheetXml, cellRef, value);
      }
      // calcChain.xml を削除しておくと、Excel側で再計算がクリーンに走る
      // (式を上書きしてもcalcChainに残ってると警告が出る場合がある)
      if (zip.file('xl/calcChain.xml')) {
        zip.remove('xl/calcChain.xml');
      }
      zip.file('xl/worksheets/sheet1.xml', sheetXml);
      return await zip.generateAsync({
        type: 'blob',
        mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        compression: 'DEFLATE',
      });
    };


    const downloadExcel = async (e, filename, reportData) => {
      const blob = await buildTemplateBlob(e, reportData);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    // 共有シート経由でDrive/LINE/メール等にExcelファイルを送る
    const shareExcel = async (e, filename, reportData) => {
      const blob = await buildTemplateBlob(e, reportData);
      const mime = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
      const isLocalFile = location.protocol === 'file:';
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      const isPWA = window.matchMedia('(display-mode: standalone)').matches ||
                    window.navigator.standalone === true;
      const errors = [];

      // 試行1: ファイル共有 (canShareチェックなし、直接実行)
      if (navigator.share) {
        try {
          const file = new File([blob], filename, { type: mime });
          await navigator.share({ files: [file], title: filename });
          return { status: 'shared' };
        } catch (err) {
          if (err && err.name === 'AbortError') return { status: 'cancelled' };
          errors.push(`file: ${err.name || ''}/${err.message || ''}`);
          console.warn('File share failed:', err);
        }

        // 試行2: テキスト共有(URL)にフォールバック
        // Excelファイルそのものは共有できないが、ダウンロードURLを共有
        try {
          // 一時的なObjectURLを作って共有してみる
          const url = URL.createObjectURL(blob);
          await navigator.share({
            title: filename,
            text: `${filename}\n(下のURLをタップしてダウンロード)`,
            url: url,
          });
          setTimeout(() => URL.revokeObjectURL(url), 60000);
          return { status: 'shared-text' };
        } catch (err) {
          if (err && err.name === 'AbortError') return { status: 'cancelled' };
          errors.push(`text: ${err.name || ''}/${err.message || ''}`);
          console.warn('Text share failed:', err);
        }
      } else {
        errors.push('navigator.share未定義');
      }

      // 試行3: 全部だめならダウンロード
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);

      let reason = '';
      if (isLocalFile) reason = '（ローカルファイル: 共有不可）';
      else if (!isMobile) reason = '（PCブラウザ: 共有非対応）';
      else if (isPWA) reason = '（PWAモード: 共有制限）';
      else reason = '';
      if (errors.length > 0) reason += ` [${errors.join(' / ')}]`;

      return { status: 'downloaded', reason };
    };

    const PCI_MODE = 'decimal';

    // ========== マイナス値ユーティリティ ==========
    // 内部値が "-95.5" のような符号付き文字列で、入力欄では絶対値部分のみを扱う

    // 内部値から絶対値の文字列を取得 (入力欄に表示する値)
    const absStr = (v) => {
      if (v === '' || v == null) return '';
      const s = String(v);
      return s.startsWith('-') ? s.slice(1) : s;
    };

    // 内部値から符号を取得 ('-' または '+')
    const getSign = (v) => {
      if (v === '' || v == null) return '+';
      return String(v).startsWith('-') ? '-' : '+';
    };

    // 絶対値入力を強制的にマイナス値として保存する用 (RSRP/RSRQ)
    const toNegative = (input) => {
      if (input === '' || input == null) return '';
      const s = String(input).replace(/^-/, ''); // 念のため先頭の - を除去
      if (s === '') return '';
      return '-' + s;
    };

    // 絶対値入力と符号を合成して保存する用 (SINR)
    // 数字入力前でも符号を保持できるよう、空+マイナスの場合は "-" のみ保存
    const withSign = (input, sign) => {
      const s = String(input ?? '').replace(/^-/, '');
      if (s === '') {
        return sign === '-' ? '-' : '';
      }
      return sign === '-' ? '-' + s : s;
    };

    // ========== DST表タブ(画像出力用) ==========
    function DSTTab({ data, upd, excelData }) {
      // dataはdstTableオブジェクト {before, after, donor}
      const updRow = (kind, idx, key, val) => {
        const rows = [...(data[kind] || [])];
        rows[idx] = { ...rows[idx], [key]: val };
        upd({ ...data, [kind]: rows });
      };
      const updDonor = (key, val) => {
        upd({ ...data, donor: { ...(data.donor || {}), [key]: val } });
      };

      // Excelデータから自動表示する値を取得
      // - kind='before' or 'after' のみ (donorは対象外)
      // - idx: 行インデックス
      const getAutoBand = (kind, idx) => {
        if (kind === 'donor' || !excelData) return '';
        const excelRow = (excelData[kind] || [])[idx];
        if (!excelRow) return '';
        return convertFreqToBand(excelRow.freq);
      };
      const getAutoPci = (kind, idx) => {
        if (kind === 'donor' || !excelData) return '';
        const excelRow = (excelData[kind] || [])[idx];
        if (!excelRow) return '';
        return excelRow.pci || '';
      };

      const renderRow = (row, idx, kind) => {
        const bandOptions = kind === 'donor' ? DST_BAND_OPTIONS_DONOR : DST_BAND_OPTIONS_DEFAULT;
        const autoBand = getAutoBand(kind, idx);
        const autoPci = getAutoPci(kind, idx);
        const usingAutoBand = !row.band && autoBand;
        const usingAutoPci = !row.pci && autoPci;
        return (
        <tr key={idx}>
          {kind !== 'donor' && (
            <td className="border border-stone-300 text-center text-stone-600 text-xs bg-stone-50 w-8">{circled[idx]}</td>
          )}
          <td className="border border-stone-300 p-0">
            <select
              value={row.band || ''}
              onChange={e => kind === 'donor' ? updDonor('band', e.target.value) : updRow(kind, idx, 'band', e.target.value)}
              className={`w-full px-1 py-1.5 bg-transparent outline-none focus:bg-teal-50 text-xs ${usingAutoBand ? 'text-teal-600 italic' : ''}`}
              title={usingAutoBand ? `自動表示中(Excelデータの${autoBand})。変更したい場合は別の値を選択` : ''}
            >
              <option value="">{autoBand ? `(自動:${autoBand})` : '-'}</option>
              {bandOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}
            </select>
          </td>
          <td className="border border-stone-300 p-0">
            <input
              value={row.pci || ''}
              onChange={e => kind === 'donor' ? updDonor('pci', e.target.value) : updRow(kind, idx, 'pci', e.target.value)}
              inputMode="numeric"
              placeholder={autoPci ? `(自動:${autoPci})` : ''}
              className={`w-full px-1 py-1.5 bg-transparent outline-none focus:bg-teal-50 text-xs ${usingAutoPci ? 'placeholder:text-teal-600 placeholder:italic' : ''}`}
            />
          </td>
          <td className="border border-stone-300 p-0">
            <input value={row.dl || ''} onChange={e => kind === 'donor' ? updDonor('dl', e.target.value) : updRow(kind, idx, 'dl', e.target.value)} inputMode="numeric" className="w-full px-1 py-1.5 bg-transparent outline-none focus:bg-teal-50 text-xs" />
          </td>
          <td className="border border-stone-300 p-0">
            <input value={row.ul || ''} onChange={e => kind === 'donor' ? updDonor('ul', e.target.value) : updRow(kind, idx, 'ul', e.target.value)} inputMode="numeric" className="w-full px-1 py-1.5 bg-transparent outline-none focus:bg-teal-50 text-xs" />
          </td>
          <td className="border border-stone-300 p-0">
            <input value={row.rtt || ''} onChange={e => kind === 'donor' ? updDonor('rtt', e.target.value) : updRow(kind, idx, 'rtt', e.target.value)} inputMode="numeric" className="w-full px-1 py-1.5 bg-transparent outline-none focus:bg-teal-50 text-xs" />
          </td>
        </tr>
        );
      };

      const renderTable = (rows, kind) => (
        <table className="text-xs border-collapse" style={{ tableLayout: 'fixed', width: 'auto' }}>
          <colgroup>
            {kind !== 'donor' && <col style={{ width: 32 }} />}
            <col style={{ width: 60 }} />
            <col style={{ width: 75 }} />
            <col style={{ width: 65 }} />
            <col style={{ width: 65 }} />
            <col style={{ width: 70 }} />
          </colgroup>
          <thead>
            <tr className="bg-stone-100">
              {kind !== 'donor' && <th className="border border-stone-300 px-1 py-1"></th>}
              <th className="border border-stone-300 px-1 py-1">バンド</th>
              <th className="border border-stone-300 px-1 py-1">PCI</th>
              <th className="border border-stone-300 px-1 py-1">DL</th>
              <th className="border border-stone-300 px-1 py-1">UL</th>
              <th className="border border-stone-300 px-1 py-1">RTT</th>
            </tr>
          </thead>
          <tbody>{rows.map((row, idx) => renderRow(row, idx, kind))}</tbody>
        </table>
      );

      // 構成図の更新
      const composition = data.composition || { main: [], branch1: [], branch2: [] };
      const updComp = (newComp) => upd({ ...data, composition: newComp });
      const hasBranch = (composition.main || []).includes(DISTRIBUTOR);

      const addCompItem = (route, item) => {
        const arr = [...(composition[route] || []), item];
        const newComp = { ...composition, [route]: arr };
        // mainから分配器を取り除いた場合は分岐もクリア
        if (route === 'main' && item === DISTRIBUTOR) {
          // 分配器を追加した場合、分岐がまだなければ空配列で初期化
          newComp.branch1 = composition.branch1 || [];
          newComp.branch2 = composition.branch2 || [];
        }
        updComp(newComp);
      };
      const removeCompItem = (route, idx) => {
        const arr = (composition[route] || []).filter((_, i) => i !== idx);
        const newComp = { ...composition, [route]: arr };
        // mainから分配器が消えたら分岐もクリア
        if (route === 'main' && !arr.includes(DISTRIBUTOR)) {
          newComp.branch1 = [];
          newComp.branch2 = [];

          <Section title="事後DST (最大6行)">
            <div className="overflow-x-auto -mx-4 px-4">
              {renderTable(data.after || [], 'after')}
            </div>

          <Section title="ドナーDST">
            <div className="overflow-x-auto -mx-4 px-4">
              {renderTable([data.donor || {}], 'donor')}
            </div>
          </Section>

          <Section title="構成図">
            <CompositionRouteEditor
              label="メイン経路"
              items={composition.main || []}
              options={COMPOSITION_OPTIONS}
              onAdd={(item) => addCompItem('main', item)}
              onRemove={(idx) => removeCompItem('main', idx)}
              hideAdd={hasBranch && (composition.main || []).slice(-1)[0] === DISTRIBUTOR}
            />
            {hasBranch && (
              <>
                <div className="text-[10px] text-stone-500 mt-2">↓ 分配器から分岐</div>
                <CompositionRouteEditor
                  label="分岐ルート①"
                  items={composition.branch1 || []}
                  options={COMPOSITION_OPTIONS_BRANCH}
                  onAdd={(item) => addCompItem('branch1', item)}
                  onRemove={(idx) => removeCompItem('branch1', idx)}
                />
                <CompositionRouteEditor
                  label="分岐ルート②"
                  items={composition.branch2 || []}
                  options={COMPOSITION_OPTIONS_BRANCH}
                  onAdd={(item) => addCompItem('branch2', item)}
                  onRemove={(idx) => removeCompItem('branch2', idx)}
                />
              </>
            )}
            <div className="text-[10px] text-stone-500 mt-2">※ 左から順番に物品を選択していくと「－」で連結されます。分配器を選択するとそこから2分岐できます</div>
          </Section>

          <div className="text-xs text-stone-500 mt-2 leading-relaxed">
            ※ 空欄の行/未入力部分は画像化時に自動的に除外されます<br/>
            ※ 下部の「画像で保存」ボタンを押すと PNG として保存できます
          </div>
        </>
      );
    }

    // DST表用の出力パネル(画像化)
    function OutputPanelDST({ data, caseName, excelData }) {
      const previewRef = useRef(null);
      const [status, setStatus] = useState('');
      const [busy, setBusy] = useState(false);
      const [open, setOpen] = useState(false);

      // band/pci の実効値を計算(DST表に値あればそれ、なければExcelデータから取得)
      const getEffective = (kind, idx, row) => {
        const eRow = (excelData && excelData[kind]) ? excelData[kind][idx] : null;
        return {
          band: row.band || (eRow ? convertFreqToBand(eRow.freq) : ''),
          pci: row.pci || (eRow ? (eRow.pci || '') : ''),
          dl: row.dl,
          ul: row.ul,
          rtt: row.rtt,
        };
      };

      // 入力されている行だけ抽出 (空行は除外)
      // 「入力されている」の判定もExcelデータと連動した値を考慮
      const filterFilledWithEffective = (rows, kind) => {
        return (rows || []).map((r, idx) => ({ ...getEffective(kind, idx, r || {}), _idx: idx }))
          .filter(r => r.band || r.pci || r.dl || r.ul || r.rtt);
      };

      const before = filterFilledWithEffective(data.before, 'before');
      const after = filterFilledWithEffective(data.after, 'after');
      const donor = data.donor || {};
      const hasDonor = donor.band || donor.pci || donor.dl || donor.ul || donor.rtt;
      const comp = data.composition || { main: [], branch1: [], branch2: [] };
      const mainItems = comp.main || [];
      const branch1Items = comp.branch1 || [];
      const branch2Items = comp.branch2 || [];
      const hasBranch = mainItems.includes(DISTRIBUTOR);
      const hasComposition = mainItems.length > 0;

      // 構成図の1行目を構築 (mainItems全部 + 分岐がある場合はbranch1)
      // 構成図の2行目を構築 (分岐がある場合のみ、分配器の手前までを非表示インデント + branch2)
      const buildLine1 = () => {
        const items = [...mainItems];
        if (hasBranch) items.push(...branch1Items);
        return items.join('－');
      };

      // 2行目: 分配器の手前まで(主な経路)+「－」で構成された幅を視覚的に「同じ幅」にして
      //        以降にbranch2の項目を表示
      const distIdx = mainItems.indexOf(DISTRIBUTOR);
      const beforeDistItems = distIdx >= 0 ? mainItems.slice(0, distIdx) : [];
      // 2行目の表示: 分配器までのprefixを非表示で同じ位置に、その後に分配器に続く2本目を表示

      const formatVal = (label, val) => (val !== '' && val != null) ? `${label}: ${val}` : `${label}: `;

      const buildFilename = () => {
        const safe = (caseName || 'DST表').replace(/[\\/:*?"<>|]/g, '_');
        return `${safe}_DST.png`;
      };

      const saveImage = async () => {
        if (!previewRef.current) return;
        if (typeof html2canvas === 'undefined') {
          setStatus('画像生成ライブラリが読み込めていません');
          setTimeout(() => setStatus(''), 4000);
          return;
        }
        setBusy(true);
        setStatus('画像生成中...');
        try {
          const canvas = await html2canvas(previewRef.current, {
            backgroundColor: '#ffffff',
            scale: 2, // 高解像度
            useCORS: true,
          });
          canvas.toBlob(async (blob) => {
            if (!blob) {
              setStatus('画像生成に失敗しました');
              setBusy(false);
              setTimeout(() => setStatus(''), 4000);
              return;
            }
            const filename = buildFilename();
            // 共有を試行
            if (navigator.share) {
              try {
                const file = new File([blob], filename, { type: 'image/png' });
                await navigator.share({ files: [file], title: filename });
                setStatus('');
                setBusy(false);
                return;
              } catch (err) {
                if (err && err.name === 'AbortError') {
                  setStatus('');
                  setBusy(false);
                  return;
                }
                // フォールバックへ
              }
            }
            // ダウンロード
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
            setStatus('画像を保存しました');
            setBusy(false);
            setTimeout(() => setStatus(''), 3000);
          }, 'image/png');
        } catch (err) {
          console.error(err);
          setStatus('エラー: ' + (err.message || 'unknown'));
          setBusy(false);
          setTimeout(() => setStatus(''), 5000);
        }
      };

      // 画像化用のテーブル(プレビューと同じ見た目)
      const renderPreviewTable = (rows, withNumber) => (
        <table style={{
          borderCollapse: 'collapse',
          fontSize: '13px',
          fontFamily: 'sans-serif',
        }}>
          <tbody>
            {rows.map((row, idx) => (
              <tr key={idx}>
                {withNumber && (
                  <td style={tdNumStyle}>{circled[idx]}</td>
                )}
                <td style={tdStyle}>{row.band || ''}</td>
                <td style={tdStyle}>{formatVal('PCI', row.pci)}</td>
                <td style={tdStyle}>{formatVal('DL', row.dl)}</td>
                <td style={tdStyle}>{formatVal('UL', row.ul)}</td>
                <td style={tdStyle}>{formatVal('RTT', row.rtt)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      );

      return (
        <div className="sticky bottom-0 z-30 bg-white border-t border-stone-200 shadow-[0_-4px_12px_-2px_rgba(0,0,0,0.06)]">
          <div className="max-w-3xl mx-auto">
            <button
              onClick={() => setOpen(!open)}
              className="w-full px-4 py-2.5 flex items-center justify-between text-sm font-semibold text-stone-700 hover:bg-stone-50"
            >
              <span className="flex items-center gap-2"><Icon name="image" size={14} />画像プレビュー</span>
              <Icon name={open ? 'chevDown' : 'chevUp'} size={16} />
            </button>
            <div className={open ? "px-4 pb-3 max-h-[55vh] overflow-y-auto border-t border-stone-100" : "h-0 overflow-hidden"} style={open ? {} : {position: 'absolute', left: '-99999px', top: 0, visibility: 'hidden'}}>
              {/* 画像化対象エリア (open=falseでも保存できるよう常時レンダリング・画面外配置) */}
              <div ref={previewRef} style={{ background: '#fff', padding: '16px', display: 'inline-block', minWidth: '100%' }}>
                {before.length > 0 && (
                  <div style={{ marginBottom: '16px' }}>
                    <div style={{ fontSize: '13px', marginBottom: '4px', fontFamily: 'sans-serif' }}>事前DST</div>
                    {renderPreviewTable(before, true)}
                  </div>
                )}
                {after.length > 0 && (
                  <div style={{ marginBottom: '16px' }}>
                    <div style={{ fontSize: '13px', marginBottom: '4px', fontFamily: 'sans-serif' }}>事後DST</div>
                    {renderPreviewTable(after, true)}
                  </div>
                )}
                {hasDonor && (
                  <div style={{ marginBottom: '16px' }}>
                    <div style={{ fontSize: '13px', marginBottom: '4px', fontFamily: 'sans-serif' }}>ドナーDST</div>
                    {renderPreviewTable([donor], false)}
                  </div>
                )}
                {hasComposition && (
                  <div style={{ marginBottom: '8px' }}>
                    <div style={{ fontSize: '13px', marginBottom: '6px', fontFamily: 'sans-serif' }}>構成図</div>
                    <div style={{ fontSize: '18px', fontFamily: 'monospace', lineHeight: '1.8', whiteSpace: 'nowrap' }}>
                      <div>{buildLine1()}</div>
                      {hasBranch && branch2Items.length > 0 && (
                        <div>
                          {/* 分配器までの幅を非表示で確保し、続けて分配器以降の2本目を表示 */}
                          <span style={{ visibility: 'hidden' }}>
                            {beforeDistItems.join('－')}{beforeDistItems.length > 0 ? '－' : ''}{DISTRIBUTOR}
                          </span>
                          <span>－{branch2Items.join('－')}</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}
                {before.length === 0 && after.length === 0 && !hasDonor && !hasComposition && (
                  <div className="text-xs text-stone-400 py-4 text-center">データが入力されていません</div>
                )}
              </div>
            </div>
            <div className="px-4 py-3 border-t border-stone-100 bg-stone-50">
              <button
                onClick={saveImage}
                disabled={busy}
                className={`w-full inline-flex items-center justify-center gap-2 px-3 py-3 rounded-lg text-base font-bold transition shadow-sm ${
                  busy ? 'bg-stone-300 text-stone-500 cursor-not-allowed' : 'bg-teal-600 text-white hover:bg-teal-700 active:scale-[0.98]'
                }`}
              >
                <Icon name="image" size={18} />
                {busy ? '生成中…' : '画像で保存'}
              </button>
              {status && <div className="text-xs text-stone-500 text-center mt-2">{status}</div>}
            </div>
          </div>
        </div>
      );
    }

    // 画像内テーブル用の共通スタイル
    const tdStyle = {
      border: '1px solid #555',
      padding: '4px 10px',
      whiteSpace: 'nowrap',
    };
    const tdNumStyle = {
      ...tdStyle,
      textAlign: 'center',
      width: '24px',
    };

    function OutputPanelExcel({ data, caseName, reportData }) {
      const [open, setOpen] = useState(false);
      const beforeTSV = useMemo(() => tableTSV(data.before), [data.before]);
      const afterTSV = useMemo(() => tableTSV(data.after), [data.after]);
      const donorTSVStr = useMemo(() => donorTSV(data.donor || []), [data.donor]);
      const summary = useMemo(() => {
        const lines = [];
        if (data.year || data.month || data.day) lines.push(`日付: ${data.year}/${data.month}/${data.day}`);
        if (data.startTime || data.endTime) lines.push(`調査時間: ${data.startTime} 〜 ${data.endTime}`);
        if (data.dlMbps || data.ulMbps) lines.push(`DST結果: DL ${data.dlMbps} Mbps / UL ${data.ulMbps} Mbps`);
        if (data.locationDetail || data.floor) lines.push(`調査場所: ${data.locationDetail} ${data.floor}階`);
        return lines.join('\n');
      }, [data]);

      const buildFilename = () => {
        const safeName = (caseName || '報告書').replace(/[\\/:*?"<>|]/g, '_');
        return `${safeName}.xlsx`;
      };

      // Excelファイル事前生成: 入力データ変更後に裏で生成しておく
      // navigator.shareは「ユーザーの直接ジェスチャー」内でのみ動作するため、
      // ボタンタップ時にBlobが既に出来上がっている必要がある
      const [preparedBlob, setPreparedBlob] = useState(null);
      const [isPreparingBlob, setIsPreparingBlob] = useState(false);
      const prepareTimerRef = useRef(null);

      useEffect(() => {
        if (prepareTimerRef.current) clearTimeout(prepareTimerRef.current);
        setPreparedBlob(null);
        setIsPreparingBlob(true);
        prepareTimerRef.current = setTimeout(async () => {
          try {
            const blob = await buildTemplateBlob(data, reportData);
            setPreparedBlob(blob);
          } catch (err) {
            console.error('blob preparation failed', err);
          } finally {
            setIsPreparingBlob(false);
          }
        }, 600);
        return () => clearTimeout(prepareTimerRef.current);
      }, [data, reportData]);

      const downloadFile = async () => {
        let blob = preparedBlob;
        if (!blob) blob = await buildTemplateBlob(data, reportData);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = buildFilename();
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      };

      const [shareStatus, setShareStatus] = useState('');
      const shareFile = async () => {
        // 事前生成されたBlobが無い場合は同期的に取得しないと
        // navigator.shareがユーザージェスチャー外と判定されてしまう
        if (!preparedBlob) {
          setShareStatus('準備中…数秒待ってから再度タップしてください');
          setTimeout(() => setShareStatus(''), 3000);
          return;
        }

        const filename = buildFilename();
        const mime = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
        const isLocalFile = location.protocol === 'file:';
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const isPWA = window.matchMedia('(display-mode: standalone)').matches ||
                      window.navigator.standalone === true;
        const errors = [];

        // 試行1: ファイル共有 (タップの瞬間に直接呼ぶ)
        if (navigator.share) {
          try {
            const file = new File([preparedBlob], filename, { type: mime });
            await navigator.share({ files: [file], title: filename });
            setShareStatus('');
            return;
          } catch (err) {
            if (err && err.name === 'AbortError') {
              setShareStatus('');
              return;
            }
            errors.push(`file: ${err.name || ''}/${err.message || ''}`);
          }
        } else {
          errors.push('navigator.share未定義');
        }

        // 試行2: ダウンロードにフォールバック
        const url = URL.createObjectURL(preparedBlob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);

        setShareStatus('保存しました');
        setTimeout(() => setShareStatus(''), 3000);
      };


      return (
        <div className="fixed bottom-0 left-0 right-0 z-20 bg-white border-t border-stone-200 shadow-[0_-4px_20px_rgba(0,0,0,0.08)] safe-bottom">
          <div className="max-w-3xl mx-auto">
            <button onClick={() => setOpen(!open)} className="w-full px-4 py-2.5 flex items-center justify-between text-sm font-semibold text-stone-700 hover:bg-stone-50">
              <span className="flex items-center gap-2"><Icon name="table" size={14} />下書き出力</span>
              <Icon name={open ? 'chevDown' : 'chevUp'} size={16} />
            </button>
            {open && (
              <div className="px-4 pb-3 max-h-[40vh] overflow-y-auto border-t border-stone-100 space-y-3 pt-3">
                {summary && (
                  <div>
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-xs font-semibold text-stone-600">概要</span>
                      <CopyButton getText={() => summary} label="コピー" className="!text-xs !py-1 !px-2" />
                    </div>
                    <pre className="whitespace-pre-wrap text-xs text-stone-700 bg-stone-50 p-2 rounded leading-relaxed" style={{fontFamily: 'inherit'}}>{summary}</pre>
                  </div>
                )}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs font-semibold text-stone-600">設置前 TSV</span>
                    <CopyButton getText={() => beforeTSV} label="Excelに貼付" className="!text-xs !py-1 !px-2" />
                  </div>
                  <pre className="whitespace-pre text-xs text-stone-700 bg-stone-50 p-2 rounded overflow-x-auto font-mono">{beforeTSV || '(未入力)'}</pre>
                </div>
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs font-semibold text-stone-600">設置後 TSV</span>
                    <CopyButton getText={() => afterTSV} label="Excelに貼付" className="!text-xs !py-1 !px-2" />
                  </div>
                  <pre className="whitespace-pre text-xs text-stone-700 bg-stone-50 p-2 rounded overflow-x-auto font-mono">{afterTSV || '(未入力)'}</pre>
                </div>
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs font-semibold text-stone-600">ドナー測定値 TSV</span>
                    <CopyButton getText={() => donorTSVStr} label="Excelに貼付" className="!text-xs !py-1 !px-2" />
                  </div>
                  <pre className="whitespace-pre text-xs text-stone-700 bg-stone-50 p-2 rounded overflow-x-auto font-mono">{donorTSVStr || '(未入力)'}</pre>
                </div>
                <p className="text-[10px] text-stone-400">※Excel側で対応セルを選択→貼付で反映</p>
              </div>
            )}
            <div className="px-4 py-3 border-t border-stone-100 bg-stone-50 space-y-2">
              <button
                onClick={shareFile}
                disabled={!preparedBlob}
                className={`w-full inline-flex items-center justify-center gap-2 px-3 py-3.5 rounded-lg text-base font-bold transition shadow-sm ${
                  preparedBlob
                    ? 'bg-teal-600 text-white hover:bg-teal-700 active:scale-[0.98]'
                    : 'bg-stone-300 text-stone-500 cursor-not-allowed'
                }`}
              >
                <Icon name="download" size={20} />
                {isPreparingBlob ? '準備中…' : 'Excelを保存'}
              </button>

              {shareStatus && <div className="text-xs text-stone-500 text-center">{shareStatus}</div>}
            </div>
          </div>
        </div>
      );
    }

    // ========== 案件一覧モーダル ==========
    function CasesModal({ cases, currentId, onSelect, onNew, onDuplicate, onDelete, onRename, onDeleteAll, onClose }) {
      const [editingId, setEditingId] = useState(null);
      const [editName, setEditName] = useState('');
      const [pendingDelete, setPendingDelete] = useState(null);
      const [pendingDeleteAll, setPendingDeleteAll] = useState(false);
      return (
        <div className="fixed inset-0 z-50 flex items-start justify-center bg-stone-900/60 p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl max-w-lg w-full mt-12 max-h-[80vh] flex flex-col" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between px-4 py-3 border-b border-stone-200">
              <h2 className="font-semibold text-stone-800">案件一覧</h2>
              <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-stone-100"><Icon name="x" size={18} /></button>
            </div>
            <div className="px-4 py-3 border-b border-stone-100 space-y-2">
              <button onClick={onNew} className="w-full inline-flex items-center justify-center gap-2 py-2.5 rounded-lg bg-teal-600 text-white font-medium hover:bg-teal-700">
                <Icon name="plus" size={16} />新規案件を作成
              </button>
              {cases.length > 1 && (
                <button onClick={() => setPendingDeleteAll(true)} className="w-full inline-flex items-center justify-center gap-2 py-2 rounded-lg bg-stone-100 text-red-600 text-sm font-medium hover:bg-red-50 border border-red-200">
                  <Icon name="trash" size={14} />過去履歴を一括削除（現在の案件は残す）
                </button>
              )}
            </div>
            <div className="overflow-y-auto flex-1 divide-y divide-stone-100">
              {cases.length === 0 && (
                <div className="p-8 text-center text-stone-400 text-sm">
                  <Icon name="alert" size={24} className="mx-auto mb-2" />案件がありません
                </div>
              )}
              {cases.map(c => {
                const isActive = c.id === currentId;
                const isEditing = editingId === c.id;
                return (
                  <div key={c.id} className={`p-3 ${isActive ? 'bg-teal-50' : ''}`}>
                    {isEditing ? (
                      <div className="flex gap-1">
                        <input value={editName} onChange={e => setEditName(e.target.value)} className="flex-1 px-2 py-1.5 border border-stone-300 rounded" autoFocus />
                        <button onClick={() => { onRename(c.id, editName); setEditingId(null); }} className="px-2 py-1 bg-teal-600 text-white rounded"><Icon name="check" size={14} /></button>
                        <button onClick={() => setEditingId(null)} className="px-2 py-1 bg-stone-300 rounded"><Icon name="x" size={14} /></button>
                      </div>
                    ) : (
                      <div className="flex items-center gap-2">
                        <button onClick={() => onSelect(c.id)} className="flex-1 text-left min-w-0">
                          <div className="flex items-center gap-1">
                            {isActive && <Icon name="check" size={14} className="text-teal-600 flex-shrink-0" />}
                            <span className="font-medium text-sm text-stone-800 truncate">{c.name}</span>
                          </div>
                          <div className="text-xs text-stone-400 mt-0.5">{new Date(c.updatedAt).toLocaleString('ja-JP')}</div>
                        </button>
                        <button onClick={() => { setEditingId(c.id); setEditName(c.name); }} className="p-1.5 rounded hover:bg-stone-200 text-stone-500"><Icon name="edit" size={14} /></button>
                        <button onClick={() => onDuplicate(c.id)} className="p-1.5 rounded hover:bg-stone-200 text-stone-500"><Icon name="copyplus" size={14} /></button>
                        <button onClick={() => setPendingDelete(c.id)} className="p-1.5 rounded hover:bg-red-100 text-red-500" disabled={cases.length <= 1}><Icon name="trash" size={14} /></button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
          {pendingDelete && (
            <ConfirmModal
              message="この案件を削除します。よろしいですか？（元に戻せません）"
              onConfirm={() => { onDelete(pendingDelete); setPendingDelete(null); }}
              onCancel={() => setPendingDelete(null)}
            />
          )}
          {pendingDeleteAll && (
            <ConfirmModal
              message={`現在の案件以外の ${cases.length - 1} 件の履歴をすべて削除します。よろしいですか？（元に戻せません）`}
              onConfirm={() => { onDeleteAll(); setPendingDeleteAll(false); }}
              onCancel={() => setPendingDeleteAll(false)}
            />
          )}

          <div className="border-t border-stone-200 px-4 py-2 text-[10px] text-stone-400 text-center">
            ツールバージョン {APP_VERSION} ({APP_VERSION_DATE})
          </div>
        </div>
      );
    }

    // ========== メインアプリ ==========
    function App() {
      const [casesIndex, setCasesIndex] = useState([]);
      const [currentId, setCurrentId] = useState(null);
      const [reportData, setReportData] = useState(emptyReport());
      const [excelData, setExcelData] = useState(emptyExcel());
      // タブ切り替えは廃止(報告書テキストのみのため)
      const [loaded, setLoaded] = useState(false);
      const [showCases, setShowCases] = useState(false);
      const [saveIndicator, setSaveIndicator] = useState('');
      const saveTimerRef = useRef(null);

      useEffect(() => {
        // ブラウザのタブタイトルにバージョン番号を反映
        document.title = `調査報告書テキスト ${APP_VERSION}`;

        const idx = loadJSON('casesIndex', []);
        setCasesIndex(idx);
        // 起動時は常にまっさらな新規案件を作成
        // 過去の案件はcasesIndexに残っているので履歴から開ける
        const newId = `case_${Date.now()}`;
        const newName = '新規案件 ' + new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const newIdx = [{ id: newId, name: newName, updatedAt: new Date().toISOString() }, ...idx];
        setCasesIndex(newIdx);
        setCurrentId(newId);
        saveJSON('casesIndex', newIdx);
        saveJSON(`case_${newId}`, { reportData: emptyReport(), excelData: emptyExcel() });
        saveJSON('lastCaseId', newId);
        setLoaded(true);
      }, []);

      const loadCaseSync = (id) => {
        const data = loadJSON(`case_${id}`, null);
        if (data) {
          setReportData({ ...emptyReport(), ...data.reportData });
          const mergedExcel = { ...emptyExcel(), ...data.excelData };
          // ensure donor exists
          if (!mergedExcel.donor) mergedExcel.donor = emptyExcel().donor;
          setExcelData(mergedExcel);
          setCurrentId(id);
          saveJSON('lastCaseId', id);
        }
      };

      useEffect(() => {
        if (!loaded || !currentId) return;
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(() => {
          saveJSON(`case_${currentId}`, { reportData, excelData });
          const autoTitle = buildAutoTitle(reportData, excelData);
          const newIdx = casesIndex.map(c => {
            if (c.id !== currentId) return c;
            // 手動リネームされていなければ自動タイトルで更新
            const name = c.manualName ? c.name : (autoTitle || c.name);
            return { ...c, name, updatedAt: new Date().toISOString() };
          });
          setCasesIndex(newIdx);
          saveJSON('casesIndex', newIdx);
          setSaveIndicator('自動保存');
          setTimeout(() => setSaveIndicator(''), 1200);
        }, 600);
        return () => clearTimeout(saveTimerRef.current);
      }, [reportData, excelData, loaded, currentId]);

      const currentCase = casesIndex.find(c => c.id === currentId);

      const newCase = () => {
        const id = `case_${Date.now()}`;
        const name = '新規案件 ' + new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const newIdx = [{ id, name, updatedAt: new Date().toISOString() }, ...casesIndex];
        setCasesIndex(newIdx);
        saveJSON('casesIndex', newIdx);
        saveJSON(`case_${id}`, { reportData: emptyReport(), excelData: emptyExcel() });
        setReportData(emptyReport());
        setExcelData(emptyExcel());
        setCurrentId(id);
        saveJSON('lastCaseId', id);
        setShowCases(false);
      };

      const duplicateCase = (sourceId) => {
        const src = loadJSON(`case_${sourceId}`, null);
        if (!src) return;
        const id = `case_${Date.now()}`;
        const srcInfo = casesIndex.find(c => c.id === sourceId);
        const name = (srcInfo?.name || '案件') + ' のコピー';
        const newIdx = [{ id, name, updatedAt: new Date().toISOString() }, ...casesIndex];
        setCasesIndex(newIdx);
        saveJSON('casesIndex', newIdx);
        saveJSON(`case_${id}`, { reportData: src.reportData, excelData: src.excelData });
        setReportData({ ...emptyReport(), ...src.reportData });
        const mergedExcel = { ...emptyExcel(), ...src.excelData };
        if (!mergedExcel.donor) mergedExcel.donor = emptyExcel().donor;
        setExcelData(mergedExcel);
        setCurrentId(id);
        saveJSON('lastCaseId', id);
        setShowCases(false);
      };

      const deleteCase = (id) => {
        deleteKey(`case_${id}`);
        const newIdx = casesIndex.filter(c => c.id !== id);
        setCasesIndex(newIdx);
        saveJSON('casesIndex', newIdx);
        if (currentId === id) {
          if (newIdx.length > 0) loadCaseSync(newIdx[0].id);
          else newCase();
        }
      };

      const renameCase = (id, newName) => {
        const newIdx = casesIndex.map(c => c.id === id ? { ...c, name: newName, manualName: true } : c);
        setCasesIndex(newIdx);
        saveJSON('casesIndex', newIdx);
      };

      const deleteAllOthers = () => {
        // 現在の案件以外をすべて削除
        const toDelete = casesIndex.filter(c => c.id !== currentId);
        toDelete.forEach(c => deleteKey(`case_${c.id}`));
        const newIdx = casesIndex.filter(c => c.id === currentId);
        setCasesIndex(newIdx);
        saveJSON('casesIndex', newIdx);
      };

      const reportText = useMemo(() => buildReportText(reportData), [reportData]);

      const updR = (k, v) => setReportData(d => ({ ...d, [k]: v }));
      const updE = (k, v) => setExcelData(d => ({ ...d, [k]: v }));
      const updRow = (which, i, k, v) => {
        setExcelData(d => {
          const arr = [...d[which]];
          arr[i] = { ...arr[i], [k]: v };
          return { ...d, [which]: arr };
        });
      };
      const updDonor = (i, k, v) => {
        setExcelData(d => {
          const arr = [...(d.donor || emptyExcel().donor)];
          arr[i] = { ...arr[i], [k]: v };
          return { ...d, donor: arr };
        });
      };

      if (!loaded) return null;

      return (
        <div className="min-h-screen bg-stone-100 pb-36">
          <header className="sticky top-0 z-30 bg-stone-900 text-white shadow-lg safe-top">
            <div className="max-w-3xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between gap-3">
                <div className="flex items-center gap-2 min-w-0">
                  <div className="w-8 h-8 rounded-lg bg-teal-500 flex items-center justify-center flex-shrink-0"><Icon name="file" size={18} /></div>
                  <div className="min-w-0">
                    <div className="text-xs text-stone-400">
                      調査報告書テキスト 作成
                      <span className="ml-1.5 text-stone-500" title={`更新日: ${APP_VERSION_DATE}`}>{APP_VERSION}</span>
                    </div>
                    <button onClick={() => setShowCases(true)} className="flex items-center gap-1 text-sm font-semibold truncate hover:text-teal-300">
                      <span className="truncate">{currentCase?.name || '案件未選択'}</span>
                      <Icon name="chevDown" size={14} className="flex-shrink-0" />
                    </button>
                  </div>
                </div>
                <div className="flex items-center gap-1">
                  {saveIndicator && <span className="text-xs text-emerald-400 hidden sm:inline">{saveIndicator}</span>}
                  <button onClick={() => setShowCases(true)} title="案件一覧" className="p-2 rounded-lg hover:bg-stone-800"><Icon name="folder" size={18} /></button>
                  <button onClick={newCase} title="新規案件" className="p-2 rounded-lg hover:bg-stone-800"><Icon name="plus" size={20} /></button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-3xl mx-auto px-4 py-4 space-y-4">
            <ReportTab data={reportData} upd={updR} />
          </main>

          <OutputPanelReport text={reportText} shareTitle={buildShareTitle(excelData)} />

          {showCases && (
            <CasesModal
              cases={casesIndex}
              currentId={currentId}
              onSelect={(id) => { loadCaseSync(id); setShowCases(false); }}
              onNew={newCase}
              onDuplicate={duplicateCase}
              onDelete={deleteCase}
              onRename={renameCase}
              onDeleteAll={deleteAllOthers}
              onClose={() => setShowCases(false)}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
